  release:
    runs-on: ubuntu-24.04
    needs: [build-core] #, update-versions]
    env:
      TAG: ${{ inputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Fetch updated tag after version bump
        run: |
          git fetch origin --force tag ${TAG}
          git checkout ${TAG}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./core/go.mod

      - name: Download core artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: core-assets-*
          merge-multiple: true
          path: ./_core_assets

      - name: Generate Changelog
        id: changelog
        run: |
          set -e
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --oneline --pretty=format:"%an|%s (%h)" | grep -v "^github-actions\[bot\]|" | sed 's/^[^|]*|/- /' | head -50)
          else
            CHANGELOG=$(git log --oneline --pretty=format:"%an|%s (%h)" "${PREVIOUS_TAG}..${TAG}" | grep -v "^github-actions\[bot\]|" | sed 's/^[^|]*|/- /')
          fi

          cat > RELEASE_BODY.md << 'EOF'
          ## Installation

          ```bash
          curl -fsSL https://install.coastlinesec.com | sh
          ```

          ## Assets

          ### Complete Packages
          - **`hgs-full-amd64.tar.gz`** - Complete package for x86_64 systems (CLI binaries + QML source + shell completions + installation guide)
          - **`hgs-full-arm64.tar.gz`** - Complete package for ARM64 systems (CLI binaries + QML source + shell completions + installation guide)

          ### Individual Components
          - **`hgs-cli-amd64.gz`** - HGS CLI binary for x86_64 systems
          - **`hgs-cli-arm64.gz`** - HGS CLI binary for ARM64 systems
          - **`hgs-distropkg-amd64.gz`** - HGS CLI binary built with distro_package tag for AMD64 systems
          - **`hgs-distropkg-arm64.gz`** - HGS CLI binary built with distro_package tag for ARM64 systems
          - **`hgsinstall-amd64.gz`** - Installer binary for x86_64 systems
          - **`hgsinstall-arm64.gz`** - Installer binary for ARM64 systems
          - **`hgs-cli-<version>.tar.gz`** - Go source code with vendored modules (for distro packaging)
          - **`hgs-qml.tar.gz`** - QML source code only

          ### Checksums
          - **`*.sha256`** - SHA256 checksums for verifying download integrity

          **Installation:** Extract the `hgs-full-*.tar.gz` package for your architecture and follow the `INSTALL.md` instructions inside.

          ---

          EOF

          cat >> RELEASE_BODY.md << EOF
          ## What's Changed

          $CHANGELOG

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${TAG}
          EOF

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat RELEASE_BODY.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Prepare release assets
        run: |
          set -euxo pipefail

          mkdir -p _release_assets

          # Copy core binaries and rename hgs-*.gz to hgs-cli-*.gz
          for file in _core_assets/hgs-*.gz*; do
            if [ -f "$file" ]; then
              basename=$(basename "$file")
              if [[ "$basename" == hgs-distropkg-* ]]; then
                cp "$file" "_release_assets/$basename"
              else
                newname=$(echo "$basename" | sed 's/^hgs-/hgs-cli-/')
                cp "$file" "_release_assets/$newname"
              fi
            fi
          done

          # Copy hgsinstall binaries
          cp _core_assets/hgsinstall-*.gz* _release_assets/

          # Copy completions
          cp _core_assets/completion.* _release_assets/ 2>/dev/null || true

          # Create QML source package (exclude build artifacts and git files)
          # Copy root LICENSE and CONTRIBUTING.md to quickshell/ for packaging
          cp LICENSE CONTRIBUTING.md quickshell/

          # Copy root assets directory to quickshell for systemd service and desktop file
          cp -r assets quickshell/

          # Tar the CONTENTS of quickshell/, not the directory itself
          (cd quickshell && tar --exclude='.git' \
              --exclude='.github' \
              --exclude='*.tar.gz' \
              -czf ../_release_assets/hgs-qml.tar.gz .)

          # Generate checksum for QML package
          (cd _release_assets && sha256sum hgs-qml.tar.gz > hgs-qml.tar.gz.sha256)

          # Create full packages for each architecture
          for arch in amd64 arm64; do
            mkdir -p _temp_full/hgs
            mkdir -p _temp_full/bin
            mkdir -p _temp_full/completions

            # Extract QML source
            tar -xzf _release_assets/hgs-qml.tar.gz -C _temp_full/hgs

            # Add CLI binaries
            if [ -f "_core_assets/hgs-${arch}.gz" ]; then
              gunzip -c "_core_assets/hgs-${arch}.gz" > _temp_full/bin/hgs
              chmod +x _temp_full/bin/hgs
            fi

            if [ -f "_core_assets/hgs-distropkg-${arch}.gz" ]; then
              gunzip -c "_core_assets/hgs-distropkg-${arch}.gz" > _temp_full/bin/hgs-distropkg
              chmod +x _temp_full/bin/hgs-distropkg
            fi

            # Add shell completions
            for completion in _core_assets/completion.*; do
              if [ -f "$completion" ]; then
                cp "$completion" _temp_full/completions/
              fi
            done

            # Copy docs directory
            if [ -d "docs" ]; then
              cp -r docs _temp_full/
            fi

            # Create installation guide
            cat > _temp_full/INSTALL.md << 'EOFINSTALL'
          # HyprGlassShell Installation

          ## Requirements

          - Wayland compositor (niri or Hyprland recommended)
          - Quickshell framework
          - Qt6

          ## Installation Steps

          1. **Install quickshell assets:**
             ```bash
             mkdir -p ~/.config/quickshell
             cp -r hgs ~/.config/quickshell/
             ```

          2. **Install the HGS CLI binaries:**
             ```bash
             sudo install -m 755 bin/hgs /usr/local/bin/hgs
             ```

          3. **Install shell completions (optional):**
             ```bash
             # Bash
             sudo install -m 644 completions/completion.bash /usr/share/bash-completion/completions/hgs

             # Fish
             sudo install -m 644 completions/completion.fish /usr/share/fish/vendor_completions.d/hgs.fish

             # Zsh
             sudo install -m 644 completions/completion.zsh /usr/share/zsh/site-functions/_hgs
             ```

          4. **Start the shell:**
             ```bash
             hgs run
             ```

          ## Configuration

          - Settings are stored in `~/.config/HyprGlassShell/settings.json`
          - See the documentation in the `hgs/` directory for more details

          ## Troubleshooting

          - Run with verbose output: `HGS_LOG_LEVEL=debug hgs run`
          - Ensure all dependencies are installed
          EOFINSTALL

            # Create the full package
            (cd _temp_full && tar -czf "../_release_assets/hgs-full-${arch}.tar.gz" .)

            # Generate checksum
            (cd _release_assets && sha256sum "hgs-full-${arch}.tar.gz" > "hgs-full-${arch}.tar.gz.sha256")

            # Cleanup
            rm -rf _temp_full
          done

      - name: Generate vendored source tarball
        run: |
          set -euxo pipefail
          VERSION_NUM=${TAG#v}
          cd core
          go mod vendor
          cd ..
          tar czf "_release_assets/hgs-cli-${VERSION_NUM}.tar.gz" \
            --transform "s,^core/,hgs-cli-${VERSION_NUM}/," \
            --exclude='core/.git' \
            core/
          (cd _release_assets && sha256sum "hgs-cli-${VERSION_NUM}.tar.gz" > "hgs-cli-${VERSION_NUM}.tar.gz.sha256")

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: _release_assets/**
          draft: false
          prerelease: ${{ contains(env.TAG, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
