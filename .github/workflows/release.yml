name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.1)"
        required: true
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: true

jobs:
  build-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    defaults:
      run:
        working-directory: core

    env:
      TAG: ${{ inputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./core/go.mod

      - name: Format check
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Run tests
        run: go test -v ./...

      - name: Build hgsinstall (${{ matrix.arch }})
        env:
          GOOS: linux
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          set -eux
          cd cmd/hgsinstall
          go build -trimpath -ldflags "-s -w -X main.Version=${TAG}" \
            -o ../../hgsinstall-${{ matrix.arch }}
          cd ../..
          gzip -9 -k hgsinstall-${{ matrix.arch }}
          sha256sum hgsinstall-${{ matrix.arch }}.gz > hgsinstall-${{ matrix.arch }}.gz.sha256

      - name: Build hgs (${{ matrix.arch }})
        env:
          GOOS: linux
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          set -eux
          cd cmd/hgs
          go build -trimpath -ldflags "-s -w -X main.Version=${TAG}" \
            -o ../../hgs-${{ matrix.arch }}
          cd ../..
          gzip -9 -k hgs-${{ matrix.arch }}
          sha256sum hgs-${{ matrix.arch }}.gz > hgs-${{ matrix.arch }}.gz.sha256

      - name: Generate shell completions
        if: matrix.arch == 'amd64'
        run: |
          set -eux
          chmod +x hgs-amd64
          ./hgs-amd64 completion bash > completion.bash
          ./hgs-amd64 completion fish > completion.fish
          ./hgs-amd64 completion zsh > completion.zsh

      - name: Build hgs-distropkg (${{ matrix.arch }})
        env:
          GOOS: linux
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          set -eux
          cd cmd/hgs
          go build -trimpath -tags distro_binary -ldflags "-s -w -X main.Version=${TAG}" \
            -o ../../hgs-distropkg-${{ matrix.arch }}
          cd ../..
          gzip -9 -k hgs-distropkg-${{ matrix.arch }}
          sha256sum hgs-distropkg-${{ matrix.arch }}.gz > hgs-distropkg-${{ matrix.arch }}.gz.sha256

      - name: Upload artifacts (${{ matrix.arch }})
        if: matrix.arch == 'arm64'
        uses: actions/upload-artifact@v5
        with:
          name: core-assets-${{ matrix.arch }}
          path: |
            core/hgsinstall-${{ matrix.arch }}.gz
            core/hgsinstall-${{ matrix.arch }}.gz.sha256
            core/hgs-${{ matrix.arch }}.gz
            core/hgs-${{ matrix.arch }}.gz.sha256
            core/hgs-distropkg-${{ matrix.arch }}.gz
            core/hgs-distropkg-${{ matrix.arch }}.gz.sha256
          if-no-files-found: error

      - name: Upload artifacts with completions
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@v5
        with:
          name: core-assets-${{ matrix.arch }}
          path: |
            core/hgsinstall-${{ matrix.arch }}.gz
            core/hgsinstall-${{ matrix.arch }}.gz.sha256
            core/hgs-${{ matrix.arch }}.gz
            core/hgs-${{ matrix.arch }}.gz.sha256
            core/hgs-distropkg-${{ matrix.arch }}.gz
            core/hgs-distropkg-${{ matrix.arch }}.gz.sha256
            core/completion.bash
            core/completion.fish
            core/completion.zsh
          if-no-files-found: error

